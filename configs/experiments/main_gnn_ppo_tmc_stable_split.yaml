base:
  - ./main_gnn_ppo_tmc_stable.yaml

experiment:
  name: gnn_ppo_split_tmc_stable

model:
  name: split
  architecture:
    input_resolution: [3, 288, 288]
    num_classes: 13
    task_names: [seg, depth, normal]

accuracy_model:
  sensitivity_path: results/accuracy_modeling/split/sensitivity_split_fixed.pkl

reward:
  # Split is the lightest backbone among the four MTL models. We keep a looser
  # delay anchor to avoid collapsing to the fast single-UAV corner, but use a
  # moderate entropy term so late-stage training can consolidate instead of
  # drifting under persistent exploration noise.
  tau_ref: 3.0
  energy_ref: 4.5
  kappa_blocks: 0.0

algorithm:
  ppo:
    entropy_coef: 0.05
