base:
  - ./main_gnn_ppo_tmc_stable.yaml

experiment:
  name: gnn_ppo_cross_tmc_stable

model:
  name: cross
  architecture:
    input_resolution: [3, 288, 288]
    num_classes: 13
    task_names: [seg, depth, normal]

accuracy_model:
  sensitivity_path: results/accuracy_modeling/cross/sensitivity_cross_fixed.pkl

reward:
  # Cross is heavier than Split but still benefits from moderate extra
  # exploration. Keep delay pressure stronger than Split to avoid drifting to
  # overly slow cooperative regimes.
  tau_ref: 2.5
  energy_ref: 14.0

algorithm:
  ppo:
    entropy_coef: 0.08
