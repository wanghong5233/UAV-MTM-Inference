# Main experiment configuration for GNN-PPO (MTAN example)

base:
  - ../default.yaml
  - ../algorithms/gnn_ppo.yaml

experiment:
  name: gnn_ppo_mtan

model:
  name: mtan
  architecture:
    input_resolution: [3, 288, 288]
    num_classes: 13
    task_names: [seg, depth, normal]

accuracy_model:
  sensitivity_path: results/accuracy_modeling/mtan/sensitivity_mtan_fixed.pkl
