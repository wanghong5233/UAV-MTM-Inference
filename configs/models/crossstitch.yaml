# Cross-Stitch Networks 模型配置

model:
  name: crossstitch
  type: soft_sharing
  
  # 模型架构
  architecture:
    backbone: resnet18
    num_tasks: 3
    task_names:
      - semantic_segmentation
      - depth_estimation
      - surface_normal
    
    # Cross-Stitch配置
    stitch_layers: [1, 2, 3, 4]     # 哪些层使用cross-stitch
    init_type: identity             # 初始化方式：identity, random, learned
  
  # 切分点配置
  split_points:
    - layer1.1
    - layer2.1
    - layer3.1
    - layer4.0
  
  # 输入输出
  input_shape: [3, 224, 224]
  num_classes:
    semantic_segmentation: 40
    depth_estimation: 1
    surface_normal: 3

# 预训练权重
pretrained:
  path: data/pretrained/crossstitch.pth
  url: null

# 特征维度
feature_dims:
  layer1.1: [64, 56, 56]
  layer2.1: [128, 28, 28]
  layer3.1: [256, 14, 14]
  layer4.0: [512, 7, 7]

